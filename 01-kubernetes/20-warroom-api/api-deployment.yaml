apiVersion: apps/v1
kind: Deployment
metadata:
  name: warroom-api
  namespace: con-warroom
  labels:
    app: warroom-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: warroom-api
  template:
    metadata:
      labels:
        app: warroom-api
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: warroom-api
          image: ghcr.io/usomarriba22/con-warroom-api:dev
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
