name: Build warroom-api

on:
  push:
    branches:
      - main
    paths:
      - "02-apps/warroom-api/**"
      - ".github/workflows/build-warroom-api.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-warroom-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push warroom-api
        uses: docker/build-push-action@v6
        with:
          context: ./02-apps/warroom-api
          file: ./02-apps/warroom-api/Dockerfile
          push: true
          no-cache: true
          tags: |
            ghcr.io/usomarriba22/con-warroom-api:dev
            ghcr.io/usomarriba22/con-warroom-api:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/usomarriba22/war
